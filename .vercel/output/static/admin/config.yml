backend:
  name: github
  repo: mingcareercounseling-design/waldorf-newsletter-images
  branch: main
  auth_type: pkce
  app_id: 0v23liDu3TN5aQanCs5F

# 媒體管理
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# 介面語言
locale: zh_Hant

collections:
  # ========== 動態集合 ==========

  - name: "news"
    label: "最新消息"
    folder: "src/content/news"
    create: true
    delete: true
    extension: json
    format: json
    slug: "{{year}}-{{month}}-{{day}}-{{fields.title}}"
    summary: "{{fields.title}} ({{fields.date}})"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "發布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY/MM/DD", time_format: false }
      - { label: "內容", name: "content", widget: "markdown" }
      - { label: "連結", name: "link", widget: "string", required: false }

  - name: "calendar_events"
    label: "行事曆活動"
    folder: "src/content/calendar"
    create: true
    delete: true
    extension: json
    format: json
    slug: "{{year}}-{{month}}-{{day}}-{{fields.title}}"
    summary: "{{fields.title}} ({{fields.date}})"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "日期", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY/MM/DD", time_format: false }
      - { label: "結束日期", name: "end_date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY/MM/DD", time_format: false, required: false }
      - { label: "說明", name: "description", widget: "text", required: false }
      - label: "分類"
        name: "category"
        widget: "select"
        options: ["慶典", "發表", "說明會", "研習", "假期", "其他"]
        default: "其他"

  - name: "teachers"
    label: "師資介紹"
    folder: "src/content/teachers"
    create: true
    delete: true
    extension: json
    format: json
    slug: "{{fields.name}}"
    summary: "{{fields.name}} - {{fields.title}}"
    fields:
      - { label: "姓名", name: "name", widget: "string" }
      - { label: "職稱", name: "title", widget: "string" }
      - { label: "照片", name: "image", widget: "image", required: false }
      - { label: "簡介", name: "bio", widget: "text" }
      - label: "類別"
        name: "category"
        widget: "select"
        options:
          - { label: "行政團隊", value: "admin" }
          - { label: "班級導師", value: "class" }
          - { label: "專科老師", value: "teacher" }
          - { label: "核心成員", value: "core" }

  - name: "newsletters"
    label: "光禾通訊"
    folder: "src/content/newsletters"
    create: true
    delete: true
    extension: json
    format: json
    slug: "NO{{fields.issue}}"
    summary: "第 {{fields.issue}} 期 - {{fields.title}}"
    fields:
      - { label: "期數", name: "issue", widget: "number" }
      - { label: "標題", name: "title", widget: "string" }
      - { label: "學期", name: "semester", widget: "string", required: false, hint: "例：114春夏" }
      - { label: "封面圖", name: "cover", widget: "image", required: false }
      - { label: "CDN 圖片前綴路徑", name: "imagePrefix", widget: "string", required: false, hint: "例：https://raw.githubusercontent.com/user/repo/main/NO37/" }
      - { label: "圖片總頁數", name: "pageCount", widget: "number", default: 1 }
      - { label: "發行年月", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY/MM/DD", time_format: false }

  # ========== 靜態頁面內容 ==========

  - name: "pages"
    label: "頁面內容"
    files:

      - label: "首頁"
        name: "home"
        file: "src/content/home.json"
        fields:
          - label: "輪播圖片"
            name: "carousel"
            widget: "list"
            fields:
              - { label: "標題", name: "title", widget: "string" }
              - { label: "副標題", name: "subtitle", widget: "string" }
              - { label: "圖片", name: "image", widget: "image", required: false }
              - { label: "連結", name: "link", widget: "string", required: false }
          - label: "精選消息"
            name: "highlights"
            widget: "list"
            fields:
              - { label: "標題", name: "title", widget: "string" }
              - { label: "日期", name: "date", widget: "string" }
              - { label: "內容摘要", name: "content", widget: "text" }
              - { label: "連結", name: "link", widget: "string", required: false }
          - label: "聯絡資訊"
            name: "contact"
            widget: "object"
            fields:
              - { label: "地址", name: "address", widget: "string" }
              - { label: "電話", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Facebook", name: "facebook", widget: "string", required: false }
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
              - { label: "YouTube", name: "youtube", widget: "string", required: false }

      - label: "關於光禾"
        name: "about"
        file: "src/content/about.json"
        fields:
          - { label: "學校願景", name: "vision", widget: "markdown" }
          - { label: "學校簡史", name: "history", widget: "markdown" }
          - { label: "辦學理念", name: "philosophy", widget: "markdown" }

      - label: "支持光禾"
        name: "support"
        file: "src/content/support.json"
        fields:
          - { label: "說明文字", name: "intro", widget: "markdown" }
          - label: "捐款方式"
            name: "methods"
            widget: "list"
            fields:
              - { label: "方式", name: "method", widget: "string" }
              - { label: "說明", name: "description", widget: "text" }

      - label: "聯絡我們"
        name: "contact_page"
        file: "src/content/contact.json"
        fields:
          - { label: "地址", name: "address", widget: "string" }
          - { label: "電話", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "地圖嵌入碼", name: "mapEmbed", widget: "text", required: false }
          - { label: "補充說明", name: "note", widget: "markdown", required: false }
