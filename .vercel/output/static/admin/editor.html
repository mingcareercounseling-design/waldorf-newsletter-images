<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>光禾華德福 - 內容編輯器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background: #f5f5f5; }
    
    .header {
      background: linear-gradient(135deg, #8B4513, #228B22);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.5rem; }
    .header-actions { display: flex; gap: 1rem; }
    
    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-primary { background: white; color: #228B22; }
    .btn-secondary { background: rgba(255,255,255,0.2); color: white; }
    .btn:hover { transform: scale(1.05); }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab {
      padding: 0.8rem 1.5rem;
      background: white;
      border: none;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 0.95rem;
      color: #666;
      transition: all 0.2s;
    }
    .tab.active {
      background: white;
      color: #228B22;
      font-weight: bold;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
    }
    
    .editor-panel {
      background: white;
      border-radius: 0 20px 20px 20px;
      padding: 2rem;
      box-shadow: 0 5px 30px rgba(0,0,0,0.1);
      display: none;
    }
    .editor-panel.active { display: block; }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none;
      border-color: #228B22;
    }
    .form-group textarea { min-height: 150px; resize: vertical; }
    
    .items-list { margin-top: 2rem; }
    .item-card {
      background: #f9f9f9;
      padding: 1.5rem;
      border-radius: 15px;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item-info h3 { color: #333; margin-bottom: 0.3rem; }
    .item-info p { color: #888; font-size: 0.9rem; }
    .item-actions { display: flex; gap: 0.5rem; }
    .btn-edit { background: #e8f5e9; color: #2e7d32; }
    .btn-delete { background: #ffebee; color: #c62828; }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 20px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-header h2 { color: #333; }
    .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #888; }
    
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #228B22;
      color: white;
      padding: 1rem 2rem;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.3s;
      font-weight: bold;
    }
    .toast.show { opacity: 1; }
    
    .import-export {
      background: white;
      padding: 2rem;
      border-radius: 20px;
      margin-top: 2rem;
      text-align: center;
    }
    .import-export h3 { margin-bottom: 1rem; color: #333; }
  </style>
</head>
<body>
  <header class="header">
    <h1>🌟 光禾華德福 - 內容編輯器</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="exportAll()">📤 匯出全部</button>
      <button class="btn btn-primary" onclick="document.getElementById('importFile').click()">📥 匯入</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </header>
  
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showPanel('teachers')">👨‍🏫 師資團隊</button>
      <button class="tab" onclick="showPanel('news')">📰 最新消息</button>
      <button class="tab" onclick="showPanel('activities')">🎉 活動集錦</button>
      <button class="tab" onclick="showPanel('admissions')">📝 招生資訊</button>
    </div>
    
    <!-- 師資團隊 -->
    <div class="editor-panel active" id="panel-teachers">
      <div style="display:flex;gap:1rem;margin-bottom:1rem;">
        <button class="btn btn-primary" onclick="openModal('teachers')">➕ 新增老師</button>
        <button class="btn btn-secondary" onclick="exportTeachers()">📤 匯出 teachers.json</button>
      </div>
      <div class="items-list" id="list-teachers"></div>
    </div>
    
    <!-- 最新消息 -->
    <div class="editor-panel" id="panel-news">
      <div style="display:flex;gap:1rem;margin-bottom:1rem;">
        <button class="btn btn-primary" onclick="openModal('news')">➕ 新增消息</button>
        <button class="btn btn-secondary" onclick="exportNews()">📤 匯出 news.json</button>
      </div>
      <div class="items-list" id="list-news"></div>
    </div>
    
    <!-- 活動集錦 -->
    <div class="editor-panel" id="panel-activities">
      <div style="display:flex;gap:1rem;margin-bottom:1rem;">
        <button class="btn btn-primary" onclick="openModal('activities')">➕ 新增活動</button>
        <button class="btn btn-secondary" onclick="exportActivities()">📤 匯出 activities.json</button>
      </div>
      <div class="items-list" id="list-activities"></div>
    </div>
    
    <!-- 招生資訊 -->
    <div class="editor-panel" id="panel-admissions">
      <button class="btn btn-primary" onclick="openModal('admissions')">➕ 新增項目</button>
      <div class="items-list" id="list-admissions"></div>
    </div>
  </div>
  
  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">編輯</h2>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <form id="modalForm">
        <input type="hidden" id="itemId">
        <input type="hidden" id="itemType">
        <div id="formFields"></div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">💾 儲存</button>
      </form>
    </div>
  </div>
  
  <div class="toast" id="toast">✅ 儲存成功！</div>

  <script>
    // 資料結構
    let data = {
      teachers: [
        { id: '1', name: '許慧玲', title: '校長', bio: '創辦人，致力於華德福教育多年', image: '' },
        { id: '2', name: '林季瑩', title: '小學部教師會主席', bio: '資深華德福教師', image: '' }
      ],
      news: [
        { id: '1', title: '115學年度招生說明會', date: '2026-03-15', content: '在春光漸暖的時節，邀請您走進孩子真實而生動的學習現場...' },
        { id: '2', title: '光禾榮獲高雄市實驗學校評鑑優等', date: '2026-02-01', content: '本校榮獲高雄市實驗學校型態評鑑最高榮譽...' }
      ],
      activities: [],
      admissions: []
    };
    
    // 從 localStorage 載入
    const saved = localStorage.getItem('waldorf-content');
    if (saved) {
      try { data = JSON.parse(saved); } catch(e) {}
    }
    
    function saveData() {
      localStorage.setItem('waldorf-content', JSON.stringify(data, null, 2));
      showToast();
      renderAll();
    }
    
    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
    
    function showPanel(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.editor-panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('panel-' + type).classList.add('active');
    }
    
    const fieldConfigs = {
      teachers: [
        { name: 'name', label: '姓名', type: 'text' },
        { name: 'title', label: '職位', type: 'text' },
        { name: 'bio', label: '介紹', type: 'textarea' },
        { name: 'image', label: '照片網址', type: 'text' }
      ],
      news: [
        { name: 'title', label: '標題', type: 'text' },
        { name: 'date', label: '日期', type: 'date' },
        { name: 'content', label: '內容', type: 'textarea' }
      ],
      activities: [
        { name: 'title', label: '活動名稱', type: 'text' },
        { name: 'date', label: '日期', type: 'date' },
        { name: 'category', label: '分類', type: 'select', options: ['四季慶典', '發表暨成果展', '心得分享', '講座研習', '花絮剪影'] },
        { name: 'content', label: '內容', type: 'textarea' }
      ],
      admissions: [
        { name: 'title', label: '標題', type: 'text' },
        { name: 'content', label: '內容', type: 'textarea' }
      ]
    };
    
    function openModal(type, id = null) {
      document.getElementById('itemType').value = type;
      document.getElementById('itemId').value = id || '';
      document.getElementById('modalTitle').textContent = id ? '編輯' : '新增';
      
      const fields = fieldConfigs[type];
      const item = id ? data[type].find(i => i.id === id) : {};
      
      let html = '';
      fields.forEach(f => {
        html += `<div class="form-group"><label>${f.label}</label>`;
        if (f.type === 'textarea') {
          html += `<textarea name="${f.name}">${item[f.name] || ''}</textarea>`;
        } else if (f.type === 'select') {
          html += `<select name="${f.name}"><option value="">請選擇</option>`;
          f.options.forEach(o => {
            html += `<option value="${o}" ${item[f.name] === o ? 'selected' : ''}>${o}</option>`;
          });
          html += `</select>`;
        } else {
          html += `<input type="${f.type}" name="${f.name}" value="${item[f.name] || ''}">`;
        }
        html += '</div>';
      });
      
      document.getElementById('formFields').innerHTML = html;
      document.getElementById('modal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    document.getElementById('modalForm').onsubmit = function(e) {
      e.preventDefault();
      const type = document.getElementById('itemType').value;
      const id = document.getElementById('itemId').value;
      const fields = fieldConfigs[type];
      
      let item = {};
      fields.forEach(f => {
        const el = document.querySelector(`[name="${f.name}"]`);
        item[f.name] = el.value;
      });
      
      if (id) {
        const index = data[type].findIndex(i => i.id === id);
        data[type][index] = { ...data[type][index], ...item };
      } else {
        item.id = Date.now().toString();
        data[type].push(item);
      }
      
      saveData();
      closeModal();
    };
    
    function deleteItem(type, id) {
      if (confirm('確定要刪除嗎？')) {
        data[type] = data[type].filter(i => i.id !== id);
        saveData();
      }
    }
    
    function renderAll() {
      // 師資
      let html = '';
      data.teachers.forEach(t => {
        html += `<div class="item-card"><div class="item-info"><h3>${t.name}</h3><p>${t.title}</p></div><div class="item-actions"><button class="btn btn-edit" onclick="openModal('teachers','${t.id}')">✏️</button><button class="btn btn-delete" onclick="deleteItem('teachers','${t.id}')">🗑️</button></div></div>`;
      });
      document.getElementById('list-teachers').innerHTML = html || '<p style="color:#888;text-align:center;padding:2rem;">尚無資料</p>';
      
      // 最新消息
      html = '';
      data.news.forEach(n => {
        html += `<div class="item-card"><div class="item-info"><h3>${n.title}</h3><p>${n.date}</p></div><div class="item-actions"><button class="btn btn-edit" onclick="openModal('news','${n.id}')">✏️</button><button class="btn btn-delete" onclick="deleteItem('news','${n.id}')">🗑️</button></div></div>`;
      });
      document.getElementById('list-news').innerHTML = html || '<p style="color:#888;text-align:center;padding:2rem;">尚無資料</p>';
      
      // 活動
      html = '';
      data.activities.forEach(a => {
        html += `<div class="item-card"><div class="item-info"><h3>${a.title}</h3><p>${a.date} - ${a.category}</p></div><div class="item-actions"><button class="btn btn-edit" onclick="openModal('activities','${a.id}')">✏️</button><button class="btn btn-delete" onclick="deleteItem('activities','${a.id}')">🗑️</button></div></div>`;
      });
      document.getElementById('list-activities').innerHTML = html || '<p style="color:#888;text-align:center;padding:2rem;">尚無資料</p>';
      
      // 招生
      html = '';
      data.admissions.forEach(a => {
        html += `<div class="item-card"><div class="item-info"><h3>${a.title}</h3></div><div class="item-actions"><button class="btn btn-edit" onclick="openModal('admissions','${a.id}')">✏️</button><button class="btn btn-delete" onclick="deleteItem('admissions','${a.id}')">🗑️</button></div></div>`;
      });
      document.getElementById('list-admissions').innerHTML = html || '<p style="color:#888;text-align:center;padding:2rem;">尚無資料</p>';
    }
    
    function exportAll() {
      // 分開匯出不同類型的 JSON
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '光禾內容 backup ' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
    }
    
    function exportTeachers() {
      const blob = new Blob([JSON.stringify({teachers: data.teachers}, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'teachers.json';
      a.click();
    }
    
    function exportNews() {
      const blob = new Blob([JSON.stringify({news: data.news}, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'news.json';
      a.click();
    }
    
    function exportActivities() {
      const blob = new Blob([JSON.stringify({activities: data.activities}, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'activities.json';
      a.click();
    }
    
    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          data = JSON.parse(e.target.result);
          saveData();
          alert('✅ 匯入成功！');
        } catch(err) {
          alert('❌ 匯入失敗：格式錯誤');
        }
      };
      reader.readAsText(file);
    }
    
    // 初始化
    renderAll();
  </script>
</body>
</html>
